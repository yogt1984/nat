name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -W clippy::all
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace

  frontend:
    name: Frontend build & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  rust-bench:
    name: Rust benchmarks (perf regression gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Restore benchmark baseline
        uses: actions/cache@v4
        with:
          path: rust/target/criterion
          key: criterion-baseline-${{ runner.os }}-${{ hashFiles('rust/**/Cargo.lock') }}
          restore-keys: criterion-baseline-${{ runner.os }}-
      - name: Run benchmarks
        run: cargo bench --package ing -- --output-format=bencher 2>&1 | tee bench_output.txt
      - name: Check for regression (>10%)
        run: |
          # Parse bencher output and check against max thresholds (ns)
          # Thresholds set at ~2x measured values to catch real regressions
          declare -A MAX_NS=(
            ["feature_compute/baseline_empty"]=50000          # 50µs max
            ["feature_compute/normal_10lvl_30trades"]=500000  # 500µs max
            ["feature_compute/stress_10lvl_300trades"]=800000 # 800µs max (must stay under emission budget)
            ["features_to_vec"]=5000                          # 5µs max
          )
          FAILED=0
          while IFS= read -r line; do
            if [[ "$line" =~ ^test[[:space:]]+(.*)[[:space:]]+\.\.\.[[:space:]]+bench:[[:space:]]+([0-9,]+)[[:space:]]ns/iter ]]; then
              name="${BASH_REMATCH[1]}"
              # Remove commas from number
              ns="${BASH_REMATCH[2]//,/}"
              if [[ -n "${MAX_NS[$name]+x}" ]]; then
                max="${MAX_NS[$name]}"
                if (( ns > max )); then
                  echo "REGRESSION: $name = ${ns}ns > max ${max}ns"
                  FAILED=1
                else
                  echo "OK: $name = ${ns}ns (max ${max}ns)"
                fi
              fi
            fi
          done < bench_output.txt
          if (( FAILED )); then
            echo "::error::Benchmark regression detected"
            exit 1
          fi

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.lock
      - name: Run tests
        run: |
          python -m pytest scripts/tests/ -x -q \
            --ignore=scripts/tests/test_integration_profiling.py \
            --ignore=scripts/tests/test_nat_cli.py \
            --ignore=scripts/tests/test_pipeline_runner.py \
            --ignore=scripts/tests/test_dashboard.py \
            --ignore=scripts/tests/test_visualize_scanner.py \
            --ignore=scripts/tests/test_model_serving.py
