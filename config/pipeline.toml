# NAT Automated Pipeline Configuration
# State machine: IDLE → INGESTING → COLLECTING → ANALYZING → DONE

[ingestion]
# Duration of data collection
duration_days = 1
# Rust ingestor config path (relative to project root)
ingestor_config = "config/ing.toml"
# Data directory (parquet output)
data_dir = "./data/features"
# Health check interval (seconds) — how often to verify ingestor is alive
health_check_interval = 300
# Maximum allowed gap before restart (seconds)
max_gap_seconds = 600

[analysis]
# Primary timeframe for cluster analysis
timeframe = "15min"
# Feature vectors to analyze
vectors = ["entropy", "trend", "volatility", "toxicity", "orderflow", "illiquidity", "flow", "context", "derived"]
# Scaler for preprocessing
scaler = "zscore"
# k-sweep range
k_min = 2
k_max = 10
# Bootstrap resamples
n_bootstrap = 50
# Random seed
random_state = 42

[analysis.thresholds]
silhouette = 0.25
bootstrap_ari = 0.6
temporal_ari = 0.5
self_transition = 0.7
kruskal_p = 0.05
eta_squared = 0.01

[output]
# Where to write analysis results
report_dir = "./reports/pipeline"
# Generate HTML report
html_report = true
# Save figures
save_figures = true
# Figure format
figure_format = "png"
# Figure DPI
figure_dpi = 150

[profiler]
# Scalping signal profiler configuration
# Bar timeframe for profiling (5min = scalping horizon)
timeframe = "5min"
# Forward return horizons in bars (1 bar = 5min at default timeframe)
horizons = [1, 2, 5, 10]
# One-way taker fee in bps (Hyperliquid: 3.5 bps)
cost_bps = 3.5
# Minimum IC to consider a feature signal
min_ic = 0.02
# Minimum directional hit rate
min_hit_rate = 0.51
# Legacy single-split forward-test in-sample fraction (used with --legacy-split)
forward_test_split = 0.70
# Walk-forward k-fold validation (default forward-test method)
n_folds = 5
min_train_bars = 200
# Top N features to report / forward test
top_n = 30
# Rolling window for IC stability (IC IR)
rolling_ic_window = 50
# Minimum observations to profile a feature
min_observations = 100
# Symbols to profile
symbols = ["BTC"]

[scanner]
# Scalp edge scanner configuration
# Bar timeframe for scanning
timeframe = "5min"
# One-way taker fee in bps (Hyperliquid: 3.5 bps)
cost_bps = 3.5
# Percentile thresholds for tail analysis
tail_percentiles = [1, 5, 10, 90, 95, 99]
# Tail threshold percentile (lower/upper cutoff)
tail_threshold = 5
# Top N features to profile (by variance)
top_features = 40
# Top N significant features for conjunction scan
conjunction_features = 15
# Minimum observations per bar
min_observations = 100
# Minimum observations in a tail region
min_tail_obs = 10
# FDR significance level
significance_alpha = 0.05
# Forward return horizon in bars
forward_horizon_bars = 1
# Symbols to scan
symbols = ["BTC"]

[smoke_test]
# 15-minute smoke test configuration
live_duration_minutes = 15
expected_symbols = ["BTC", "ETH", "SOL"]
expected_rate_per_sec = 10
emission_rate_tolerance = 0.20
cross_symbol_max_diff = 0.01
nan_threshold_core = 0.05
max_gap_seconds = 5.0
warmup_seconds = 30
optional_vectors = ["whale", "liquidation", "concentration"]
cluster_k = 4
cluster_max_samples = 5000
silhouette_floor = -0.1
bar_timeframe = "1min"

[state]
# State file tracks pipeline progress (JSON)
state_file = "./data/pipeline_state.json"
# Log file
log_file = "./logs/pipeline.log"
