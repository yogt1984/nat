# NAT Agent Configuration
# Autonomous hypothesis-driven alpha discovery daemon
#
# Config Schema:
#   [defaults]            — inherited by all agents unless overridden
#   [defaults.gates]      — fdr_q, min_oos_dates, min_symbols
#   [defaults.decay]      — ic_decay_ratio, consecutive_days_limit
#   [defaults.symbols]    — primary = ["BTC", "ETH", "SOL"]
#   [defaults.paths]      — data_dir
#
#   [agent]               — microstructure agent (tick-level)
#   [agent_mf]            — medium-frequency agent (5min bars)
#   [agent_macro]         — macro agent (1h bars)
#   [meta_agent]          — orchestrator (no hypothesis generation)
#   [agent_cascade]       — cascade validation agent
#
# Required keys (after defaults merge):
#   cycle_interval_s, max_experiments_per_cycle, generators_enabled
#
# Each section only needs to specify keys that differ from [defaults].
# Unknown keys produce warnings (not errors) for forward-compatibility.

# ─────────────────────────────────────────────────────────────
# Defaults — inherited by all agent sections unless overridden
# ─────────────────────────────────────────────────────────────

[defaults]
max_cycle_runtime_s = 5400

[defaults.gates]
fdr_q = 0.05
min_oos_dates = 2
min_symbols = 2

[defaults.decay]
ic_decay_ratio = 0.5
consecutive_days_limit = 14

[defaults.symbols]
primary = ["BTC", "ETH", "SOL"]

[defaults.paths]
data_dir = "data/features"

# ─────────────────────────────────────────────────────────────
# Microstructure Agent (tick-level, <1min horizons)
# ─────────────────────────────────────────────────────────────

[agent]
# Cycle interval — time between research cycles (seconds)
cycle_interval_s = 3600

# Per-cycle budget
max_experiments_per_cycle = 10

# Enabled generators (order = execution order)
generators_enabled = [
    "systematic",
    "spectral",
    "regime",
    "cross_asset",
    "recycler",
    "ensemble",
]

[agent.gates]
# Minimum thresholds for passing through the research pipeline
min_ic = 0.10
min_dIC = 0.05  # gate must improve IC by at least this over ungated baseline
min_coverage = 0.10
min_walkforward_sign_consistency = 0.80

[agent.cost]
# Trading cost assumptions (bps, one-way)
taker_fee_bps = 3.5
# Minimum net Sharpe after costs to pass cost gate
min_net_sharpe = 0.5

[agent.promotion]
# Paper trading → live promotion criteria
paper_sharpe_min = 1.5
paper_days = 7
realized_ic_ratio_min = 0.8
max_drawdown_pct = 2.0

[agent.paths]
state_dir = "data/agent"
report_dir = "reports"

# ─────────────────────────────────────────────────────────────
# Medium-Frequency Agent (1min–1h horizons, 5min bar resolution)
# Runs alongside microstructure agent with separate state
# ─────────────────────────────────────────────────────────────

[agent_mf]
cycle_interval_s = 7200
max_experiments_per_cycle = 8
timeframe = "5min"
generators_enabled = [
    "momentum",
    "vol_breakout",
    "flow_cluster",
]

[agent_mf.gates]
min_ic = 0.08       # lower than micro: fewer obs per day at 5min bars
min_dIC = 0.03

[agent_mf.paths]
state_dir = "data/agent_mf"

# ─────────────────────────────────────────────────────────────
# Macro Agent (1h–24h horizons, 1h bar resolution)
# Uses funding rate, OI divergence, whale flow features
# ─────────────────────────────────────────────────────────────

[agent_macro]
cycle_interval_s = 14400
max_experiments_per_cycle = 6
max_cycle_runtime_s = 7200
timeframe = "1h"
generators_enabled = [
    "funding_meanrev",
    "oi_divergence",
    "whale_momentum",
]

[agent_macro.gates]
min_ic = 0.07       # lowest: ~24 bars/day at 1h
min_dIC = 0.02

[agent_macro.paths]
state_dir = "data/agent_macro"

# ─────────────────────────────────────────────────────────────
# Meta-Agent (Orchestrator)
# Coordinates all research agents, no hypothesis generation
# ─────────────────────────────────────────────────────────────

[meta_agent]
cycle_interval_s = 21600        # 6 hours
correlation_threshold = 0.70    # cross-agent dedup threshold
min_portfolio_signals = 2       # minimum signals for portfolio assembly

[meta_agent.promotion]
paper_sharpe_min = 1.5
paper_days = 7

# ─────────────────────────────────────────────────────────────
# Cascade Validation Agent
# Continuous 5-gate validation of the liquidity heatmap model
# ─────────────────────────────────────────────────────────────

[agent_cascade]
cycle_interval_s = 3600
min_auc = 0.65
min_lift = 2.0
min_net_ic = 0.02
walk_forward_min_auc = 0.60
walk_forward_fail_frac = 0.20
cross_symbol_min_cosine = 0.6
max_orthogonality_r2 = 0.30
cascade_price_thresh = 0.03
cascade_horizon_ticks = 3000

# ─────────────────────────────────────────────────────────────
# Alert Service
# Telegram notifications for market alerts and research events.
# Env vars TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID override these.
# ─────────────────────────────────────────────────────────────

[alerts]
# telegram_bot_token = ""      # from @BotFather (prefer env var)
# telegram_chat_id  = ""       # target chat / group (prefer env var)
redis_url = "redis://127.0.0.1:6379"

# Which Redis channels to subscribe to
channels = ["nat:alerts", "nat:research:events"]

# Research event types to forward (empty = all)
research_events = ["hypothesis_registered", "cycle_completed"]
