# ING Configuration
# Hyperliquid Market Data Ingestor

[general]
log_level = "info"
data_dir = "../data/features"

[websocket]
url = "wss://api.hyperliquid.xyz/ws"
reconnect_delay_ms = 1000
max_reconnect_delay_ms = 30000
ping_interval_ms = 30000

[symbols]
# Canonical symbol list — loaded from symbols_file at startup.
# Resolved relative to THIS config file's directory (so it works whether the
# config lives in <repo>/config or an installed /etc/nat). Inline 'assets' below
# is the fallback if symbols_file is missing.
symbols_file = "symbols.toml"
assets = ["BTC", "ETH", "SOL"]

[features]
# Feature emission interval (milliseconds)
emission_interval_ms = 100

# Trade buffer window (seconds)
trade_buffer_seconds = 60

# Number of order book levels to use
book_levels = 10

# Price buffer size (for volatility/entropy calculations)
price_buffer_size = 1000

# GMM regime classifier model path (optional)
# When set, features will include regime classification (Accumulation/Distribution/etc)
# Train with: make train_gmm
# gmm_model_path = "models/regime_gmm.json"

# Trade-size whale flow detection
# Classifies trades above threshold as whale activity, feeding 12 whale_flow features
[features.whale_flow]
whale_threshold_usd = 100000.0

# Position tracker — polls wallet positions via Hyperliquid REST API
# Feeds liquidation risk (13), concentration (15), and upgraded whale flow features
# T0/Q1.1: enabled for cloud-box (T0b) deployment to resolve the 82 dead features.
# Deploy target is the Hetzner cloud box ONLY — su-35 stays on the prior binary
# until the Jun-17 7-day clean streak completes (hard guardrail).
[position_tracker]
enabled = true
poll_interval_secs = 60
max_concurrent_requests = 10
discover_from_trades = true
max_tracked_wallets = 50
whale_threshold_usd = 500000.0
initial_wallets = []

[output]
# Output format (only parquet supported)
format = "parquet"

# Rows per row group
row_group_size = 10000

# Compression: zstd, snappy, gzip, or none
compression = "zstd"

# File rotation interval (max age of an open file: 5m, 10m, 1h, ...).
# Smaller = less data orphaned in an unrenamed .tmp on an unclean stop/restart
# (the open file is only finalized to a readable .parquet on rotation/close),
# at the cost of more files per day. Capped at 1h by hour-boundary rotation.
rotate_interval = "10m"

[trade_output]
# Raw trade persistence (individual trades to Parquet)
# Enables event-driven fill simulation downstream
enabled = true
data_dir = "../data/trades"
buffer_size = 50000
compression = "zstd"

[algorithms]
# Microstructure algorithms (dummy impls, real logic in Python)
# enabled = ["regime_gated", "kalman_imbalance"]
enabled = []

[redis]
url = "redis://127.0.0.1:6379"
# channel_prefix = "nat"
# cache_ttl_seconds = 60
publish_interval_ms = 500

[metrics]
# Prometheus metrics endpoint (optional)
# prometheus_addr = "127.0.0.1:9090"

[dashboard]
# Enable real-time dashboard (can override with ING_DASHBOARD_ENABLED=true)
enabled = false
# Dashboard server address
addr = "0.0.0.0:8080"
