# Algorithm Configuration
# Each section maps to constructor kwargs for the corresponding algorithm.
# Modify parameters here to tune algorithm behavior without changing code.

[evaluation]
# symbols: loaded from config/symbols.toml via load_symbols()
horizons = [1, 5, 10, 50, 100]
regime_feature = "ent_book_shape"
regime_percentile = 30

# ── Group A: Order Flow ─────────────────────────────────────────

[weighted_ofi]
decay_lambda = 0.5          # exponential depth decay rate (default; overridden when auto_tune=true)
ema_span = 50               # ticks for OFI momentum EMA
auto_tune = true            # fit decay from rank IC of each level vs forward returns

[trade_through]
volume_window = 10           # ticks to accumulate volume
aggressor_window = 50        # ticks for aggressor ratio smoothing

[propagator]
decay_exponent = 0.5         # power-law exponent (Bouchaud 2004)
impact_window = 100          # ticks for impact estimation
permanent_ema_span = 500     # EMA span for permanent component
auto_tune = true             # estimate decay_exponent from ACF

# ── Group B: Hawkes ──────────────────────────────────────────────

[hawkes_intensity]
baseline_window = 300        # ticks for baseline estimation
decay_beta = 0.1             # exponential decay rate
alpha_fraction = 0.5         # branching ratio (must be < 1)
auto_tune = true             # estimate alpha/beta from count data

[kalman_imbalance]
theta = 0.1                  # OU mean-reversion speed
auto_tune = true             # estimate sigma_process/sigma_obs from data

# ── Group C: Volatility & Jump ───────────────────────────────────

[jump_detector]
window = 100                 # rolling window for Lee-Mykland statistic
significance = 3.0           # z-threshold for jump detection
reversion_horizon = 50       # ticks to measure post-jump reversion

[bipower_jump]
window = 100                 # rolling window for bipower variation

# ── Group D: Toxicity ────────────────────────────────────────────

[vpin_regime]
vpin_threshold_pct = 80      # percentile for toxic regime
momentum_span = 50           # EMA span for VPIN momentum
gate_window = 300            # rolling window for percentile

[spread_decomp]
ema_span = 100               # EMA span for trend smoothing
regime_window = 300          # rolling window for spread regime
regime_percentile = 70       # adverse threshold percentile

# ── Group E: Entropy ─────────────────────────────────────────────

[entropy_momentum]
low_entropy_pct = 30         # percentile below which = "predictable"
momentum_window = 300        # rolling window for entropy percentile

[surprise_signal]
roc_window = 50              # ticks for rate-of-change
transition_threshold = 2.0   # z-score for regime transition

# ── Group F: Cross-Asset ─────────────────────────────────────────

[funding_reversion]
zscore_entry = 2.0           # z-score threshold for signal
momentum_span = 100          # EMA span for funding momentum
premium_weight = 0.3         # weight of premium_bps in composite

[oi_divergence]
price_window = 300           # ticks for price trend estimation
oi_window = 300              # ticks for OI trend estimation

# ── Group G: Latent State ────────────────────────────────────────

[switching_ou]
theta_fast = 0.5             # mean-reversion speed, fast regime
theta_slow = 0.05            # mean-reversion speed, slow regime
transition_rate = 0.01       # prior transition probability per tick
dt = 0.1                     # tick interval in seconds

[optimal_entry]
theta = 0.1                  # OU theta for internal Kalman
sigma_process = 0.01         # process noise
sigma_obs = 0.1              # observation noise
dt = 0.1                     # tick interval
sprt_drift = 0.001           # drift under H1
alpha_error = 0.05           # type-I error
beta_error = 0.20            # type-II error

# ── Group H: Cascade ─────────────────────────────────────────────

[cascade_probability]
lr = 0.01                    # SGD learning rate
lr_decay = 0.9999            # per-update LR decay
l2_reg = 0.001               # L2 regularization
max_class_weight = 50.0      # cap on inverse-frequency class weight

# ── Group J: ML Wave 1 ──────────────────────────────────────────

[change_point_detector]
cusum_threshold = 5.0        # CUSUM alarm threshold
cusum_drift = 0.05           # CUSUM drift subtracted per step
hazard_rate = 0.005          # Bayesian OCD prior P(change-point)
max_run_length = 500         # truncate run-length distribution
calibration_window = 200     # rolling window for CUSUM normalization

[momentum_continuation]
model_path = "models/momentum_continuation"
entropy_ceiling = 0.85       # entropy gate threshold
p_long = 0.6                 # P(continuation) threshold for long
p_short = 0.4                # P(continuation) threshold for short

[regime_state_machine]
accum_thresh = 0.70          # accumulation score threshold
distrib_thresh = 0.70        # distribution score threshold
entropy_low = 0.30           # low entropy boundary (trending)
entropy_high = 0.60          # high entropy boundary (ranging)
hurst_trend = 0.55           # Hurst exponent for trending regimes
vol_noise_mult = 2.0         # vol > mult * median -> volatile noise
min_duration = 5             # minimum bars before regime transition

# ── Wave 2b: Mean-Reversion Detector ───────────────────────────

[mean_reversion_detector]
model_path = "models/mean_reversion_detector"
entropy_threshold = 0.70       # inverted gate: active when ent > threshold
zscore_threshold = 2.0         # maximum abs(zscore) for signal
reversion_prob_thresh = 0.65   # minimum P(reversion) for nonzero signal

# ── Wave 2c: Meta-Labeling ─────────────────────────────────────

[meta_labeling]
model_path = "models/meta_labeling"
meta_threshold = 0.55          # minimum P(success) for nonzero size
profit_target_bps = 5.0        # triple-barrier upper target
stop_loss_bps = 10.0           # triple-barrier lower stop
max_holding_bars = 100         # triple-barrier time horizon

# ── Wave 3a: Regime-Conditioned LightGBM ──────────────────────

[regime_conditioned_lgbm]
model_dir = "models/regime_conditioned_lgbm"
confidence_threshold = 0.60    # min RSM confidence for per-regime routing
min_samples_regime = 500       # min training samples per regime group

# ── Wave 3b: KNN Retrieval ────────────────────────────────────

[knn_retrieval]
k = 20                         # number of nearest neighbors
buffer_size = 5000             # max historical states in ring buffer
time_decay_halflife = 500      # halflife for time-decay weighting (bars)
refit_interval = 100           # bars between KD-tree + covariance rebuilds
cost_threshold_bps = 2.0       # min |expected_return| for signal (bps)
win_rate_threshold = 0.60      # min win rate for signal

# ── Group I: Pattern Convolver ──────────────────────────────────

# ── Ensemble ────────────────────────────────────────────────────

[ensemble]
algorithms = ["jump_detector", "optimal_entry", "funding_reversion", "surprise_signal", "weighted_ofi"]
method = "equal_weight"         # "equal_weight", "ic_weight", or "regime_switch"
ic_lookback = 5000              # trailing window for ic_weight method
regime_column = "ent_book_shape" # column for regime_switch method

# ── Group I: Pattern Convolver ──────────────────────────────────

[convolver]
kernel_path = "models/convolver_kernels"
candle_ticks = 600            # 60s candles (600 × 100ms)
window_width = 20             # W: candles in scoring window
atr_period = 14               # N_atr
range_lookback = 20           # N for event detection (discovery only)
volume_multiplier = 1.5       # breakout volume filter (discovery only)
trap_confirmation_lag = 3     # K (discovery only)
trap_atr_threshold = 1.0     # alpha (discovery only)
evr_threshold = 0.80         # SVD truncation
ic_threshold = 0.03          # minimum |IC| for retention
fdr_q = 0.05                 # BH-FDR significance level
train_ratio = 0.60           # walk-forward split
min_events = 100             # minimum n_e for stable SVD
