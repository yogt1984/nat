# Hypothesis Testing Configuration
# Realistic parameters for statistical validation to succeed
# Version: 1.0 - 2026-03-30

[general]
# Overall testing approach
mode = "conservative"  # conservative, moderate, aggressive
random_seed = 42
output_dir = "./output/hypothesis_tests"
save_detailed_results = true

# =============================================================================
# DATA REQUIREMENTS
# =============================================================================

[data]
# Minimum sample size for reliable statistics
min_ticks = 100000  # ~1-2 weeks at 1 tick/sec
min_hours = 336     # 2 weeks
min_trades = 50000

# Symbol selection
symbols = ["BTC", "ETH"]  # Start with 2 most liquid
require_all_symbols = false  # Can proceed with 1 if both unavailable

# Time period filtering
exclude_first_hours = 24  # Exclude first day (warm-up)
exclude_last_hours = 24   # Exclude last day (lookahead prevention)

# Market regime filtering (optional)
filter_regimes = false
required_regimes = ["normal", "high_vol", "low_vol"]

# Data quality thresholds
max_nan_ratio = 0.01  # Max 1% NaN per feature
max_gap_minutes = 10  # Flag if gaps > 10 minutes

# =============================================================================
# FEATURE ENGINEERING
# =============================================================================

[features]
# Feature selection (reduce from 183 to most promising subset)
use_feature_subset = true
max_features = 20  # Focus on top 20 to reduce multiple testing burden

# Pre-selected promising features based on theory
core_features = [
    "whale_net_flow_1h",
    "whale_net_flow_4h",
    "vpin_50",
    "kyle_lambda_100",
    "entropy_rate",
    "imbalance_qty_l5",
    "regime_absorption_1h",
    "regime_divergence_1h",
    "momentum_300",
    "hurst_exponent",
]

# Feature engineering windows (reduced to most informative)
[features.windows]
entropy_windows = [5, 30, 900]  # 5s, 30s, 15m (reduced from 6)
illiquidity_windows = [100, 500]  # Reduced from 4
vpin_buckets = [50]  # Single most stable
trend_windows = [300, 600]  # 5min, 10min (reduced from 4)
whale_flow_windows = ["1h", "4h"]  # Reduced from 6

# =============================================================================
# STATISTICAL THRESHOLDS (RELAXED FOR INITIAL VALIDATION)
# =============================================================================

[statistics]
# Significance levels
alpha = 0.05  # Standard 5% (not Bonferroni-corrected initially)
bonferroni_correction = false  # Disable initially, enable after finding signals

# Effect size requirements (relaxed)
min_correlation = 0.03  # Pearson r (relaxed from 0.05)
min_mutual_info = 0.01  # bits (relaxed from 0.02)
min_information_coefficient = 0.02  # IC (relaxed from 0.05)

# Confidence intervals
confidence_level = 0.95
bootstrap_iterations = 1000  # For CI estimation

# Multiple testing (when enabled)
fdr_method = "benjamini_hochberg"  # Less stringent than Bonferroni
fdr_alpha = 0.10

# =============================================================================
# HYPOTHESIS-SPECIFIC PARAMETERS
# =============================================================================

[hypothesis.h1_whale_flow]
name = "Whale flow predicts returns"
enabled = true

# Relaxed success criteria
min_correlation = 0.03  # Was 0.05
min_p_value = 0.01      # Was 0.001 (less stringent)
min_mutual_info = 0.01  # Was 0.02 bits

# Forward return horizons to test
horizons_seconds = [1800, 3600, 7200, 14400]  # 30m, 1h, 2h, 4h

# Whale definition
whale_threshold_usd = 100000  # $100K+ trades
mega_whale_threshold_usd = 1000000  # $1M+

# Conditional analysis
test_regime_conditional = true  # Test separately in different regimes
test_volatility_conditional = true

[hypothesis.h2_entropy_whale]
name = "Entropy + whale flow interaction"
enabled = true

# Relaxed criteria
min_lift = 5.0  # Was 10% (relaxed)
min_p_value = 0.05  # Was 0.01

# Entropy regime thresholds
low_entropy_threshold = 0.3  # Below = predictable
high_entropy_threshold = 0.7  # Above = random

# Interaction test
test_method = "chi_squared"  # chi_squared, logistic_regression
min_interaction_effect = 0.02  # Interaction term coefficient

[hypothesis.h3_liquidation_cascade]
name = "Liquidation cascades predictable"
enabled = true

# Relaxed criteria (liquidations are rare, hard to predict)
min_precision = 0.20  # Was 0.30 (relaxed)
min_lift = 1.5       # Was 2.0x (relaxed)
min_recall = 0.15     # Allow low recall if precision good

# Cascade detection
cluster_threshold_usd = 5000000  # $5M+ cluster
cascade_window_seconds = 300     # 5 minutes
lead_time_seconds = [60, 300, 600]  # 1m, 5m, 10m lead time

# Directional prediction
predict_direction = true  # Long squeeze vs short squeeze

[hypothesis.h4_concentration_vol]
name = "Concentration predicts volatility"
enabled = true

# Relaxed criteria
min_correlation = 0.15  # Was 0.20
min_partial_correlation = 0.08  # Was 0.10
min_p_value = 0.05

# Volatility measurement
volatility_window_seconds = 3600  # 1 hour
volatility_method = "parkinson"  # parkinson, garman_klass, realized

# Concentration metrics
concentration_metrics = ["hhi", "top10_concentration", "gini"]
test_granger_causality = true
max_lag = 12  # 12 hours

[hypothesis.h5_persistence]
name = "Persistence indicator works"
enabled = true

# Walk-forward validation (most critical)
[hypothesis.h5_persistence.walk_forward]
n_folds = 5
expanding_window = true  # Use expanding, not rolling
min_is_size = 50000  # Minimum in-sample size
min_oos_size = 20000  # Minimum out-of-sample size

# Success criteria (relaxed)
min_oos_sharpe = 0.3  # Was 0.5 (very relaxed)
min_oos_is_ratio = 0.5  # Was 0.7 (relaxed)
min_win_rate = 0.48  # Allow slightly <50% if Sharpe good

# Regime analysis
test_regime_robustness = true
min_regimes_positive = 2  # At least 2 out of 3 regimes

# =============================================================================
# STRATEGY PARAMETERS (FOR H5 BACKTESTING)
# =============================================================================

[strategy]
# Entry/exit thresholds (conservative to avoid overtrading)
entry_threshold = 0.001  # 10 bps prediction (relaxed from 0.002)
exit_threshold = 0.0     # Exit at zero (mean reversion)
direction = "long"       # long, short, both

# Position management
position_sizing = "equal"  # equal, volatility_scaled, kelly
max_position_size = 1.0

# Risk management
use_stop_loss = false  # Disable initially
stop_loss_pct = 1.0
use_take_profit = false
take_profit_pct = 2.0

# Holding period constraints
min_holding_seconds = 60      # 1 minute minimum
max_holding_seconds = 3600    # 1 hour maximum
timeout_exit = true

# Transaction costs (realistic)
[strategy.costs]
taker_fee_bps = 6.0   # 0.06% (Hyperliquid taker)
maker_fee_bps = 2.0   # 0.02% (maker rebate)
slippage_bps = 2.0    # Assume 2bps slippage
model_as = "taker"    # conservative assumption

# =============================================================================
# REGIME DETECTION PARAMETERS
# =============================================================================

[regime]
# Accumulation/Distribution thresholds (relaxed)
accumulation_threshold = 0.65  # Was 0.70
distribution_threshold = 0.65  # Was 0.70
ranging_threshold = 0.40       # Below this = no clear regime

# Regime persistence filtering
min_regime_duration_seconds = 600  # 10 minutes (relaxed from 15m)
use_regime_filter = true
regime_transition_smoothing = "ema"  # ema, median, none
smoothing_alpha = 0.3

# Regime composite weights (can be tuned)
[regime.weights]
absorption = 0.35
divergence = 0.30  # Negative = accumulation
churn = 0.15
range_position = 0.20

# =============================================================================
# VALIDATION METHODS
# =============================================================================

[validation]
# Cross-validation approach
cv_method = "walk_forward"  # walk_forward, blocked, purged
n_splits = 5
test_size_ratio = 0.20

# Train/test split
train_ratio = 0.70
validation_ratio = 0.15
test_ratio = 0.15

# Time-series specific
use_purged_cv = true  # Remove leakage between folds
purge_window_seconds = 3600  # 1 hour gap
embargo_seconds = 1800  # 30 minute embargo after train

# =============================================================================
# REPORTING
# =============================================================================

[reporting]
# Output formats
save_json = true
save_csv = true
save_plots = true
generate_html_report = true

# Verbosity
verbose = true
log_level = "INFO"  # DEBUG, INFO, WARNING, ERROR

# Plots to generate
[reporting.plots]
correlation_matrix = true
time_series = true
qq_plots = true
regime_distribution = true
pnl_curve = true
drawdown = true
feature_importance = true

# =============================================================================
# PERFORMANCE OPTIMIZATION
# =============================================================================

[performance]
# Parallel processing
use_multiprocessing = true
n_jobs = -1  # Use all available cores
chunk_size = 10000  # Process in chunks

# Memory management
use_lazy_loading = true
max_memory_gb = 8.0

# Caching
cache_features = true
cache_dir = "./cache/features"

# =============================================================================
# EXPERIMENT TRACKING
# =============================================================================

[tracking]
# Automatic experiment tracking
enable_tracking = true
experiment_name = "hypothesis_validation_v1"

# Track all configurations
track_config = true
track_data_stats = true
track_feature_stats = true
track_results = true

# Integration
save_to_experiments_json = true

# =============================================================================
# DEBUGGING & DIAGNOSTICS
# =============================================================================

[debug]
# Development mode
debug_mode = false
sample_size = 10000  # Use subset in debug mode

# Validation checks
validate_features = true
check_lookahead_bias = true
check_data_leakage = true
check_feature_stability = true

# Diagnostics
print_feature_summary = true
print_correlation_warnings = true
print_missing_data_report = true

# =============================================================================
# FAILURE THRESHOLDS (WHEN TO ABORT)
# =============================================================================

[failure_conditions]
# Abort testing if these conditions not met
min_valid_samples = 10000
max_nan_ratio = 0.05
min_features_available = 10
min_trading_days = 7

# Warnings (don't abort, but flag)
warn_low_samples = 50000
warn_high_correlation = 0.95  # Features too correlated
warn_low_variance = 0.0001    # Feature not informative

# =============================================================================
# COMMENTS & NOTES
# =============================================================================

# This configuration is designed for INITIAL VALIDATION with:
# 1. Relaxed thresholds to avoid false negatives
# 2. Reduced feature set to avoid multiple testing issues
# 3. Conservative strategy parameters to avoid overtrading
# 4. Realistic transaction costs
# 5. Proper time-series CV to avoid lookahead bias
#
# NEXT STEPS after initial validation:
# 1. If hypotheses pass → tighten thresholds gradually
# 2. If hypotheses fail → loosen further or reconsider features
# 3. Enable Bonferroni correction only after confirming base effects
# 4. Expand to full 183 features only if subset works
#
# PHILOSOPHY:
# Better to find weak but real signal with relaxed thresholds
# than to miss signal entirely with over-stringent requirements.
# Can always tighten later; can't recover from premature rejection.
