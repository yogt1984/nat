[it_engine]
buffer_size = 6000          # 10min at 100ms (100ms × 6000 = 600s)
compute_interval_s = 5      # recompute IT metrics every 5s
ksg_k = 5                   # KSG nearest neighbors
horizons = [10, 50, 500]    # tick-level forward horizons
stride_divisor = 5          # subsample stride = max(1, horizon / divisor)
bar_horizons = ["5min", "25min", "50min"]  # MF bar horizons
max_features_greedy = 10    # greedy forward selection limit
te_top_n = 20               # compute transfer entropy for top-N features
te_lag = 1                  # TE source lags
te_order = 1                # TE target AR order
te_method = "ksg"           # "ksg" (nonparametric CMI) or "linear" (Gaussian AR)
cmi_min_samples = 200       # minimum samples for reliable CMI estimation
cmi_max_z_dims = 5          # cap conditioning dimensionality
# symbols: loaded from config/symbols.toml via load_symbols()

# Entropy features used as conditioning variable Z in CMI(f; r | Z)
entropy_conditioning = [
    "ent_tick_5s",
    "ent_book_shape_std",
    "ent_perm_8_std",
]

# Costs: loaded from config/costs.toml (override here if needed)
# [it_engine.costs]
