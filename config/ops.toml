# Operational monitoring daemons (T0b).

[gap_alert]
# Page if no new feature data has been written for longer than this. Default 300s
# ("<5 min page") sits comfortably above the writer's flush cadence so normal
# row-group buffering never false-alarms. Lower it once the deploy's real cadence
# is known (the 48h test targets zero gaps >60s, measured from row timestamps).
gap_threshold_s = 300
poll_interval_s = 30

# Dirs watched for freshness (newest *.parquet OR *.parquet.tmp mtime wins).
data_dirs = ["data/features"]

# T4: row-timestamp freshness, surfaced in gap state / `nat status` as a
# diagnostic (newest readable row's age from closed-file footer stats). NOT a
# standalone trigger: closed-file stats lag up to a full hourly rotation, so they
# would false-alarm right after every rotation/restart. The gap trigger stays on
# the freshest-file mtime (which includes the live .parquet.tmp). Reserved for a
# future .tmp size-delta stalled-buffer check.
row_threshold_s = 600

# State + liveness files.
state_path     = "data/ops/gap_state.json"
heartbeat_path = "data/ops/gap_alert.heartbeat"
pid_file       = "data/ops/gap_alert.pid"

# Local fallback alert sink — always written even without Telegram, so a gap is
# never invisible. `nat status` reads gap_state.json; this is the durable log.
alert_log      = "data/ops/alerts.log"

# Intentional-pause marker. `nat stop` writes it (expected shutdown → no page);
# `nat start` clears it. The gap daemon keeps RUNNING either way, so an
# *unexpected* ingestor death (no marker) still alerts.
pause_file     = "data/ops/ingestion_paused"
