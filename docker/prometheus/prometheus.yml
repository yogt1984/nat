global:
  scrape_interval: 5s
  evaluation_interval: 15s

rule_files:
  - '/etc/prometheus/rules.yml'

scrape_configs:
  - job_name: 'nat-ingestor'
    static_configs:
      - targets: ['nat-ingestor:9090']
        labels:
          service: 'ingestor'

  # T18: business-state metrics (lifecycle funnel / paper / live P&L) exposed by
  # the Python metrics exporter (turns SQLite/JSON into Prometheus gauges).
  - job_name: 'nat-metrics-exporter'
    static_configs:
      - targets: ['nat-metrics-exporter:9094']
        labels:
          service: 'metrics-exporter'
