groups:
  - name: ingestor_staleness
    rules:
      # Fires when the ingestor stops emitting features for 5 minutes.
      # Catches zombie processes that are alive but not producing data.
      - alert: IngestorFeatureEmissionStopped
        expr: rate(ing_features_emitted_total[5m]) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Ingestor has stopped emitting features"
          description: "ing_features_emitted_total rate is 0 for 5 minutes — likely a zombie process."

      # Fires when Prometheus cannot scrape the ingestor metrics endpoint.
      # Catches container crashes or network issues.
      - alert: IngestorUnreachable
        expr: up{job="nat-ingestor"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Ingestor Prometheus exporter is unreachable"
          description: "Cannot scrape nat-ingestor:9090 for 2 minutes."

      # Fires when error rate spikes above 10/min for any symbol.
      - alert: IngestorHighErrorRate
        expr: rate(ing_errors_total[5m]) * 60 > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Ingestor error rate elevated for {{ $labels.symbol }}"
          description: "{{ $labels.symbol }} errors at {{ $value | printf \"%.1f\" }}/min (threshold: 10/min)."
