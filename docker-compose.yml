version: '3.8'

# NAT Stack - Hyperliquid Market Data Infrastructure
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f        # View logs
#   docker-compose down           # Stop all services
#
# Prerequisites:
#   - Set TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID in .env file

services:
  # Redis for pub/sub and caching
  redis:
    image: redis:7-alpine
    container_name: nat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # Market data ingestor
  ingestor:
    build:
      context: .
      dockerfile: docker/Dockerfile.ingestor
    container_name: nat-ingestor
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - RUST_LOG=info
      - ING_PROMETHEUS_ADDR=0.0.0.0:9090
      - ING_DASHBOARD_ENABLED=true
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/metrics | grep -q ing_features_emitted_total"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Gap-alert daemon (T0b) — pages via Telegram when feature ingestion stalls.
  # Watches the shared data volume; reads only, so safe alongside any ingestor.
  gap-alert:
    build:
      context: .
      dockerfile: docker/Dockerfile.gapalert
    container_name: nat-gap-alert
    depends_on:
      ingestor:
        condition: service_healthy
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "python", "scripts/ops/gap_alert.py", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # REST API + WebSocket server
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: nat-api
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3010:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - NAT_API_HOST=0.0.0.0
      - NAT_API_PORT=3000
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Telegram alert service
  alerts:
    build:
      context: .
      dockerfile: docker/Dockerfile.alerts
    container_name: nat-alerts
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - RUST_LOG=info
    restart: unless-stopped

  # Kill-switch daemon (T16) — polls PnL/IC; publishes halts to
  # data/risk/halt_state.json (the IPC contract the T17 bridge reads).
  kill-switch:
    build:
      context: .
      dockerfile: docker/Dockerfile.killswitch
    container_name: nat-kill-switch
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "scripts/risk/kill_switch.py", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  # Promotion daemon (T14) — automates lifecycle DISCOVERED→…→APPROVAL_PENDING.
  promotion:
    build:
      context: .
      dockerfile: docker/Dockerfile.promotion
    container_name: nat-promotion
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "python", "scripts/promotion_daemon.py", "health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  # Signal bridge daemon (T17) — executes LIVE signals; checks halt_state.json
  # every cycle. depends_on the kill-switch being healthy (no execution without it).
  signal-bridge:
    build:
      context: .
      dockerfile: docker/Dockerfile.bridge
    container_name: nat-signal-bridge
    depends_on:
      kill-switch:
        condition: service_healthy
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "python", "scripts/execution/signal_bridge.py", "health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  # Research frontend
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: nat-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3000
    restart: unless-stopped

  # Prometheus metrics
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: nat-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=90d'
    restart: unless-stopped

  # Grafana dashboards
  grafana:
    image: grafana/grafana:11.1.0
    container_name: nat-grafana
    depends_on:
      - prometheus
    ports:
      - "3002:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-nat}
      - GF_AUTH_ANONYMOUS_ENABLED=${GRAFANA_ANON:-true}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    restart: unless-stopped

  # PostgreSQL for state persistence
  postgres:
    image: postgres:16-alpine
    container_name: nat-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=nat
      - POSTGRES_USER=nat
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nat_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nat"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # Optuna dashboard for evolutionary optimization
  optuna-dashboard:
    image: ghcr.io/optuna/optuna-dashboard:latest
    container_name: nat-optuna-dashboard
    ports:
      - "8070:8080"
    environment:
      - OPTUNA_STORAGE=postgresql://nat:${POSTGRES_PASSWORD:-nat_dev}@postgres:5432/nat
    depends_on:
      - postgres
    restart: unless-stopped

  # Caddy reverse proxy (HTTPS)
  caddy:
    image: caddy:2-alpine
    container_name: nat-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-admin@example.com}
    depends_on:
      - grafana
      - api
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  postgres_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  default:
    name: nat-network
